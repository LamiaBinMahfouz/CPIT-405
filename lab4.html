<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Great Auto Parts - Order Form</title>
    <link rel="stylesheet" href="lab4.css">
</head>
<body>

<h1>Great Auto Parts - Order Form</h1>

<form>

    <label>First Name:</label>
    <input type="text" required>

    <label>Last Name:</label>
    <input type="text" required>

    <label>Email:</label>
    <input type="email" required>

    <label>Phone Number:</label>
    <input type="tel">

    <label>Make:</label>
    <input type="text">

    <label>Model:</label>
    <input type="text">

    <label>Year:</label>
    <input type="number">

    <label>Date:</label>
    <input type="date">

    <label>Spare Part:</label>
    <input type="text">

    <label>Quantity:</label>
    <input type="number">

    <label>Comment:</label>
    <textarea rows="4"></textarea>

    <button type="submit">Submit</button>

</form>

</body>
</html>
